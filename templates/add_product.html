<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Add Product</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
        }

        p.subtitle {
            margin: 8px 0 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width {
            grid-column: span 2;
        }

        .group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        input, select {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .checkbox-group {
            flex-direction: row;
            align-items: center;
            gap: 10px;
            background: #f1f5f9;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .checkbox-group input {
            width: auto;
            cursor: pointer;
        }

        button {
            margin-top: 24px;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .footer-links {
            margin-top: 24px;
            text-align: center;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .logout-link {
            text-decoration: none;
            color: #ef4444;
            font-size: 14px;
            font-weight: 500;
        }

        .logout-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h2>Create New Product</h2>
            <p class="subtitle">Enter product details to update the live store catalog.</p>
        </header>

        <form method="POST">
            <div class="form-grid">
                <div class="group">
                    <label>Product Code</label>
                    <input type="text" name="code" placeholder="e.g. HSB001" required>
                </div>
                <div class="group">
                    <label>Category</label>
                    <select name="category" required>
                        <option value="bag">Bag</option>
                        <option value="sneaker">Sneaker</option>
                        <option value="kids-item">Kids Item</option>
                        <option value="ladies-item">Ladies Item</option>
                        <option value="gadgets-accessories">Gadgets</option>
                    </select>
                </div>
                <div class="group full-width">
                    <label>Product Title</label>
                    <input type="text" name="title" placeholder="e.g. Luxury Leather Tote" required>
                </div>
                <div class="group">
                    <label>Current Price (৳)</label>
                    <input type="number" step="0.01" name="price" required>
                </div>
                <div class="group">
                    <label>Old Price (Optional ৳)</label>
                    <input type="number" step="0.01" name="old_price">
                </div>
                <div class="group">
                    <label>Image File Name</label>
                    <input type="text" name="file_name" placeholder="e.g. 1.jpg" required>
                </div>
                <div class="group">
                    <label>Rating (1-5)</label>
                    <input type="number" name="rating" min="0" max="5" value="5">
                </div>
                <div class="group">
                    <label>Reviews Count</label>
                    <input type="number" name="reviews" value="0">
                </div>
                <div class="group">
                    <label>Badge Text</label>
                    <input type="text" name="badge_text" placeholder="e.g. NEW or HOT">
                </div>
                <div class="group full-width">
                    <label>Badge Styling</label>
                    <select name="badge_class">
                        <option value="badge-new">Green (New Arrivals)</option>
                        <option value="badge-sale">Red (Discount/Sale)</option>
                    </select>
                </div>
                <div class="group full-width checkbox-group">
                    <input type="checkbox" name="is_featured" id="featured">
                    <label for="featured" style="margin-bottom: 0;">Feature this product on the Homepage?</label>
                </div>
            </div>
            <button type="submit" class="full-width">Save Product to Catalog</button>
        </form>

        <div class="footer-links">
            <a href="/admin/logout" class="logout-link">Secure Logout</a>
        </div>
    </div>
</body>
</html>
